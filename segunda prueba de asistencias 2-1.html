<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Asistencia Autónomo</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --success: #10b981;
            --success-hover: #059669;
            --danger: #ef4444;
            --background: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
        }

        h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: #0f172a; }
        .subtitle { color: var(--text-light); font-size: 14px; margin-bottom: 30px; }

        .grid-botones {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            font-family: inherit;
            font-weight: 600;
            font-size: 15px;
            padding: 14px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }

        .btn-blue { background-color: var(--primary); color: white; }
        .btn-blue:hover { background-color: var(--primary-hover); }
        
        .btn-green { background-color: var(--success); color: white; }
        .btn-green:hover { background-color: var(--success-hover); }
        
        .btn-danger { background-color: var(--danger); color: white; padding: 8px 12px; font-size: 13px; width: auto; border-radius: 6px; }
        
        .btn-secondary { background-color: #e2e8f0; color: #334155; margin-top: 10px; }
        .btn-secondary:hover { background-color: #cbd5e1; }

        .card-section {
            background: #f1f5f9;
            padding: 25px;
            border-radius: 12px;
            margin-top: 20px;
            text-align: left;
            animation: fadeIn 0.3s ease;
            border: 1px solid var(--border);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-section h3 { margin-top: 0; color: #0f172a; font-size: 18px; text-align: center; margin-bottom: 20px; }

        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #475569; }
        
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            box-sizing: border-box;
        }

        #qrcode { display: inline-block; padding: 10px; background: white; border-radius: 8px; }
        .qr-container { text-align: center; margin: 20px 0; }
        
        #reader { width: 100%; border-radius: 12px; overflow: hidden; background: black; }
        
        .hidden { display: none; }

        /* Estilos de la Tabla Interna de Asistencias */
        .tabla-contenedor {
            width: 100%;
            overflow-x: auto;
            margin-top: 15px;
            border-radius: 8px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            text-align: left;
            background: white;
        }
        
        th { background-color: #f8fafc; color: #475569; padding: 12px 10px; font-weight: 600; border-bottom: 2px solid var(--border); }
        td { padding: 12px 10px; border-bottom: 1px solid var(--border); color: #334155; }
        tr:last-child td { border-bottom: none; }
        
        .tabla-header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 25px;
            margin-bottom: 10px;
        }
        .tabla-header-flex h4 { margin: 0; color: #334155; font-size: 16px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Hoja de Registro de Asistencias</h1>
        <p class="subtitle">Base de datos local con marca de tiempo automática</p>
        
        <div class="grid-botones">
            <button class="btn-blue" id="btnRecoger" onclick="iniciarRecogida()">Recoger Asistencia (Generar QR)</button>
            <button class="btn-green" id="btnRegistrar" onclick="iniciarRegistro()">Registrar Asistencia (Estudiante)</button>
        </div>

        <div id="seccionRecoger" class="card-section hidden">
            <h3>Código QR del Aula</h3>
            <div class="qr-container">
                <div id="qrcode"></div>
            </div>

            <div class="tabla-header-flex">
                <h4>Estudiantes Registrados</h4>
                <button class="btn-danger" onclick="limpiarBaseDatos()">Borrar Lista</button>
            </div>
            
            <div class="tabla-contenedor">
                <table id="tablaAsistencia">
                    <thead>
                        <tr>
                            <th>Nombres</th>
                            <th>Apellidos</th>
                            <th>Carnet</th>
                            <th>Fecha y Hora</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
            <button class="btn-secondary" style="margin-top: 20px;" onclick="ocultarSecciones()">Volver al Inicio</button>
        </div>

        <div id="seccionFormulario" class="card-section hidden">
            <h3>Datos del Estudiante</h3>
            
            <label for="nombres">Sus dos nombres</label>
            <input type="text" id="nombres" placeholder="Ej. Francisco Abel" autocomplete="off">

            <label for="apellidos">Sus dos apellidos</label>
            <input type="text" id="apellidos" placeholder="Ej. López Escoto" autocomplete="off">

            <label for="carnet">Número de Carnet Estudiantil</label>
            <input type="text" id="carnet" placeholder="Ej. 20260100251" autocomplete="off">

            <button class="btn-blue" onclick="procesarFormulario()">Siguiente: Escanear QR</button>
            <button class="btn-secondary" onclick="ocultarSecciones()">Cancelar</button>
        </div>

        <div id="seccionCamara" class="card-section hidden">
            <h3>Escaneando Código QR...</h3>
            <div id="reader"></div>
            <button class="btn-secondary" style="margin-top: 15px;" onclick="cancelarEscaneo()">Modificar Datos / Atrás</button>
        </div>
    </div>

    <script>
        let datosEstudiante = {};
        let html5QrCode;
        const TOKEN_VALIDACION = "ASISTENCIA_LOCAL_PERFECTA_2026";

        // Al iniciar la página, cargamos la tabla si ya hay datos guardados previamente
        document.addEventListener("DOMContentLoaded", actualizarTablaVisual);

        function ocultarSecciones() {
            document.getElementById('seccionRecoger').classList.add('hidden');
            document.getElementById('seccionFormulario').classList.add('hidden');
            document.getElementById('seccionCamara').classList.add('hidden');
        }

        // PROFESOR: Generar QR e imprimir la tabla interna
        function iniciarRecogida() {
            ocultarSecciones();
            document.getElementById('seccionRecoger').classList.remove('hidden');
            document.getElementById('qrcode').innerHTML = ""; 
            
            new QRCode(document.getElementById("qrcode"), {
                text: TOKEN_VALIDACION,
                width: 200,
                height: 200,
                colorDark : "#0f172a",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });
            actualizarTablaVisual();
        }

        // ESTUDIANTE: Mostrar Formulario
        function iniciarRegistro() {
            ocultarSecciones();
            document.getElementById('seccionFormulario').classList.remove('hidden');
        }

        // Valida formulario
        function procesarFormulario() {
            const nom = document.getElementById('nombres').value.trim();
            const ape = document.getElementById('apellidos').value.trim();
            const car = document.getElementById('carnet').value.trim();

            if (!nom || !ape || !car) {
                alert("⚠️ Debes rellenar tus dos nombres, tus dos apellidos y tu número de carnet.");
                return;
            }

            // Guardar temporalmente los datos
            datosEstudiante = { nombres: nom, apellidos: ape, carnet: car };

            ocultarSecciones();
            document.getElementById('seccionCamara').classList.remove('hidden');
            encenderCamara();
        }

        // Extensión directa a la cámara
        function encenderCamara() {
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                onScanSuccess
            ).catch(err => {
                alert("No se pudo abrir la cámara. Asegúrate de dar los permisos o usar Live Server.");
                cancelarEscaneo();
            });
        }

        function onScanSuccess(decodedText, decodedResult) {
            if (decodedText === TOKEN_VALIDACION) {
                html5QrCode.stop().then(() => {
                    guardarEnTablaInterna(datosEstudiante);
                }).catch(err => console.error(err));
            } else {
                alert("❌ Código QR incorrecto.");
            }
        }

        function cancelarEscaneo() {
            if (html5QrCode && html5QrCode.isScanning) {
                html5QrCode.stop().then(() => iniciarRegistro());
            } else {
                iniciarRegistro();
            }
        }

        // GUARDA LOS DATOS DENTRO DE LA MISMA ASISTENCIA CON FECHA Y HORA AUTOMÁTICA
        function guardarEnTablaInterna(datos) {
            // Obtener base de datos local actual o crear una vacía si no existe
            let listaAsistencia = JSON.parse(localStorage.getItem("bd_asistencia")) || [];

            // Generar fecha y hora automática del sistema
            const ahora = new Date();
            const fechaHoraTexto = ahora.toLocaleString('es-ES', { 
                day: '2-digit', 
                month: '2-digit', 
                year: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });

            // Creamos el registro completo del alumno
            const nuevoRegistro = {
                nombres: datos.nombres,
                apellidos: datos.apellidos,
                carnet: datos.carnet,
                fechahora: fechaHoraTexto
            };

            // Agregamos el alumno al inicio de la lista
            listaAsistencia.unshift(nuevoRegistro);

            // Guardamos de vuelta en la memoria interna de la aplicación
            localStorage.setItem("bd_asistencia", JSON.stringify(listaAsistencia));

            alert(`✅ ¡Asistencia de ${datos.nombres} registrada con éxito dentro de la tabla!`);

            // Limpiar campos del formulario para el siguiente alumno
            document.getElementById('nombres').value = "";
            document.getElementById('apellidos').value = "";
            document.getElementById('carnet').value = "";
            
            // Regresar al panel del profesor para ver reflejado el cambio
            iniciarRecogida();
        }

        // Dibuja las filas de la tabla usando los datos internos guardados
        function actualizarTablaVisual() {
            const tbody = document.querySelector("#tablaAsistencia tbody");
            let listaAsistencia = JSON.parse(localStorage.getItem("bd_asistencia")) || [];

            if (listaAsistencia.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:var(--text-light);">No hay alumnos registrados aún.</td></tr>';
                return;
            }

            // Generar filas dinámicamente con las marcas de tiempo automáticas
            tbody.innerHTML = listaAsistencia.map(alumno => `
                <tr>
                    <td>${alumno.nombres}</td>
                    <td>${alumno.apellidos}</td>
                    <td>${alumno.carnet}</td>
                    <td style="font-weight: 600; color: var(--primary);">${alumno.fechahora}</td>
                </tr>
            `).join("");
        }

        // Opción para resetear la tabla
        function limpiarBaseDatos() {
            if (confirm("¿Estás seguro de que deseas borrar toda la lista de asistencia actual?")) {
                localStorage.removeItem("bd_asistencia");
                actualizarTablaVisual();
            }
        }
    </script>
</body>
</html>
